<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <!-- Background -->
  <rect width="700" height="400" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="40" y="70" fill="white" font-family="Arial" font-size="32" font-weight="bold">Counter using HTML</text>

  <!-- Count display with red underline -->
  <text x="40" y="120" fill="white" font-family="Arial" font-size="18">Your Current Count is : <tspan font-weight="bold">1</tspan></text>
  <line x1="40" y1="128" x2="320" y2="128" stroke="red" stroke-width="2"/>

  <!-- Error message -->
  <text x="40" y="160" fill="red" font-family="Arial" font-size="16">Error : Cannot go below 0</text>

  <!-- Decrement Button -->
  <rect x="40" y="190" width="130" height="44" fill="transparent" stroke="white" stroke-width="2"/>
  <text x="105" y="218" fill="white" font-family="Arial" font-size="15" text-anchor="middle">Decrement</text>

  <!-- Increment Button -->
  <rect x="185" y="190" width="130" height="44" fill="transparent" stroke="white" stroke-width="2"/>
  <text x="250" y="218" fill="white" font-family="Arial" font-size="15" text-anchor="middle">Increment</text>

  <!-- Clear Button -->
  <rect x="330" y="190" width="100" height="44" fill="white" stroke="white" stroke-width="2"/>
  <text x="380" y="218" fill="black" font-family="Arial" font-size="15" font-weight="bold" text-anchor="middle">Clear</text>

  <!-- Footer label -->
  <text x="350" y="370" fill="#888" font-family="Arial" font-size="13" text-anchor="middle">🔗 Live Demo — GitHub Pages</text>
</svg>
